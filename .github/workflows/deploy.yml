name: Deploy to Lab Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via GCP Jump Host
        run: |
          # Setup SSH Directory
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.GCP_KEY }}" > ~/.ssh/gcp_key
          printf "%s\n" "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/gcp_key ~/.ssh/deploy_key

          # Configure SSH for ProxyJump
          cat >> ~/.ssh/config << EOF
          Host gcp
            HostName ${{ secrets.GCP_HOST }}
            User ${{ secrets.GCP_USER }}
            IdentityFile ~/.ssh/gcp_key
            StrictHostKeyChecking no

          Host lab
            HostName localhost
            Port 2222
            User ${{ secrets.LAB_USER }}
            IdentityFile ~/.ssh/deploy_key
            ProxyJump gcp
            StrictHostKeyChecking no
            PasswordAuthentication no
          EOF

          # Execute Deployment Commands on Server
          ssh lab << 'ENDSSH'
            set -e
            echo "Successfully connected to Lab Server as $(whoami)"
            cd ~/projects/CodePulse
            git pull origin main
            source backend/venv/bin/activate
            pip install -r backend/requirements.prod.txt
            sudo systemctl restart codepulse-backend
            echo "Waiting for sandbox to be ready..."
            for i in $(seq 1 12); do
              RESULT=$(curl -s -X POST http://127.0.0.1:8080/run \
                -H "Content-Type: application/json" \
                -d '{"code": "print(1+1)"}')
              echo "$RESULT" | grep -q '"2"' && echo "Sandbox OK" && break
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
              if [ "$i" = "12" ]; then echo "Sandbox check FAILED after 60s"; exit 1; fi
            done
            echo "Deployment Successful at $(date)"
          ENDSSH
