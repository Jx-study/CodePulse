services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=codepulse
      - POSTGRES_USER=codepulse
      - POSTGRES_PASSWORD=codepulse_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse -d codepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/__pycache_
    environment:
      - DATABASE_URL=postgresql://codepulse:codepulse_dev@postgres:5432/codepulse
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - FLASK_ENV=${FLASK_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    command: python app.py

  # Vite dev server
  frontend:
    build:
      context: ./frontend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      # 使用 localhost:5000 因為瀏覽器是從主機訪問，不是從容器內
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
