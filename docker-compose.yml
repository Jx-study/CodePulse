services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=codepulse
      - POSTGRES_USER=codepulse
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse -d codepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox-sidecar:
    build:
      context: ./backend/sandbox_sidecar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/__pycache_
    env_file:
      - .env
    environment:
      # 容器內 DB 連線（覆蓋 .env 內 host=postgres 的設定，dev 用）
      - DATABASE_URL=postgresql://codepulse:${DB_PASSWORD}@postgres:5432/codepulse
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-sidecar:
        condition: service_started
    command: python app.py

  # Vite dev server
  frontend:
    build:
      context: ./frontend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      # Vite proxy target (server-side only, NOT exposed to browser JS)
      - PROXY_TARGET=http://backend:5000
      # OAuth redirect: 瀏覽器直接訪問 Flask，不走 Vite proxy
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
