services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=codepulse
      - POSTGRES_USER=codepulse
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse -d codepulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sandbox-sidecar:
    build:
      context: ./backend/sandbox_sidecar
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MIN_POOL_SIZE=${MIN_POOL_SIZE:-10}
      - MAX_POOL_SIZE=${MAX_POOL_SIZE:-30}
      - MAX_REUSE=${MAX_REUSE:-50}
      - CONTAINER_TIMEOUT=${CONTAINER_TIMEOUT:-10}
      - ACQUIRE_TIMEOUT=${ACQUIRE_TIMEOUT:-8}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/__pycache_
      - fastembed_cache:/tmp/fastembed_cache
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
      - SANDBOX_SIDECAR_URL=http://sandbox-sidecar:8080
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=1
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-sidecar:
        condition: service_started
      redis:
        condition: service_healthy
    command: python app.py

  celery-worker:
    build:
      context: ./backend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    volumes:
      - ./backend:/app
      - /app/__pycache_
      - fastembed_cache:/tmp/fastembed_cache
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SANDBOX_SIDECAR_URL=http://sandbox-sidecar:8080
      - USE_CELERY=1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      sandbox-sidecar:
        condition: service_started
    command: >
      celery -A celery_worker worker
      --loglevel=info
      --concurrency=2
      --pool=prefork

  # Vite dev server
  frontend:
    build:
      context: ./frontend
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      # Vite proxy target (server-side only, NOT exposed to browser JS)
      - PROXY_TARGET=http://backend:5000
      # OAuth redirect: 瀏覽器直接訪問 Flask，不走 Vite proxy
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
  fastembed_cache:
